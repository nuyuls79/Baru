name: Build Release (FINAL XOR)

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - Patch-obfuscation   # tambahkan branch yang kamu pakai
      - Patch-XOR

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Siapkan Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore dari Secret
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > app/release.keystore

      - name: Izinkan Gradle
        run: chmod +x gradlew

      - name: Mulai Proses Build
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: release.keystore
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # XOR & Repo (tambahan untuk enkripsi di build)
          XOR_SECRET_KEY: ${{ secrets.XOR_SECRET_KEY }}
          PREMIUM_REPO: ${{ secrets.PREMIUM_REPO }}
          FREE_REPO: ${{ secrets.FREE_REPO }}

      - name: Upload APK ke GitHub
        uses: actions/upload-artifact@v4
        with:
          name: XStream-Release
          path: app/build/outputs/apk/**/*.apk
