name: Build Release (FINAL Patch-XOR)

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - Patch-XOR

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Siapkan Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore dari Secret
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > app/release.keystore

      - name: Izinkan Gradle
        run: chmod +x gradlew

      - name: Mulai Proses Build
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: release.keystore
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # === TAMBAHAN ADIXTREAM: SECURITY REPO PROTECTOR (LEVEL 2 - XOR) ===
          # Menyuntikkan Kunci Rahasia dan Base64 ke dalam sistem Gradle
          XOR_SECRET_KEY: ${{ secrets.XOR_SECRET_KEY }}
          PREMIUM_REPO_ENCODED: ${{ secrets.PREMIUM_REPO_ENCODED }}
          FREE_REPO_ENCODED: ${{ secrets.FREE_REPO_ENCODED }}
          FIREBASE_URL_ENCODED: ${{ secrets.FIREBASE_URL_ENCODED }}
          # ===================================================================

      - name: Upload APK ke GitHub
        uses: actions/upload-artifact@v4
        with:
          name: XStream-Release
          # Mencari semua file apk di dalam folder output (termasuk folder stable)
          path: app/build/outputs/apk/**/*.apk
