version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01-ndk   # 🔁 Ganti image
    resource_class: large
    working_directory: ~/project
    environment:
      GRADLE_OPTS: "-Xmx3g -Dorg.gradle.daemon=false"
    steps:
      - checkout

      - restore_cache:
          keys:
            - gradle-cache-v2-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}
            - gradle-cache-v2-

      - run:
          name: Setup
          command: chmod +x gradlew
          # Tidak perlu instalasi tambahan

      - run:
          name: Decode Keystore
          command: |
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "Keystore decoded"
            ls -lah app/keystore.jks

      - run:
          name: Configure Gradle Memory
          command: |
            echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8" >> gradle.properties
            echo "org.gradle.daemon=false" >> gradle.properties

      - run:
          name: Clean Project
          command: ./gradlew clean --no-daemon

      - run:
          name: Build Release APK
          command: ./gradlew assembleRelease --no-daemon --stacktrace --max-workers=2

      - save_cache:
          paths:
            - ~/.gradle
          key: gradle-cache-v2-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}

      - store_artifacts:
          path: app/build/outputs/apk
          destination: apk

      - store_artifacts:
          path: app/build/outputs/bundle
          destination: bundle

workflows:
  version: 2
  build_apk:
    jobs:
      - build
